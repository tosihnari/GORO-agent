<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI時代のデザイナー評価軸 | DesignShift</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #faf9f6; }
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
    body { font-family: 'Noto Sans JP', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const {
      RadarChart, PolarGrid, PolarAngleAxis, Radar, Legend, ResponsiveContainer
    } = Recharts;

    // Simple icon components
    const MenuIcon = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    );

    const XIcon = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    );

    function App() {
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);
      const [activeRole, setActiveRole] = useState('uiux');

      useEffect(() => {
        const handleScroll = () => {
          setScrolled(window.scrollY > 20);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const uiuxData = [
        { skill: '手作業の速度/描画力', traditional: 70, aiEra: 30 },
        { skill: 'ツール操作', traditional: 90, aiEra: 40 },
        { skill: '要件定義・戦略', traditional: 60, aiEra: 90 },
        { skill: 'ユーザー共感', traditional: 80, aiEra: 95 },
        { skill: 'AI言語化', traditional: 10, aiEra: 85 },
        { skill: 'システム設計', traditional: 70, aiEra: 100 },
      ];

      const graphicData = [
        { skill: 'ゼロから造形', traditional: 90, aiEra: 40 },
        { skill: 'バリエーション', traditional: 80, aiEra: 20 },
        { skill: 'コンセプト思考', traditional: 70, aiEra: 95 },
        { skill: 'トーン統制', traditional: 70, aiEra: 100 },
        { skill: 'AIディレクション', traditional: 10, aiEra: 90 },
        { skill: 'ラストマイル', traditional: 80, aiEra: 85 },
      ];

      const chartData = activeRole === 'uiux' ? uiuxData : graphicData;

      const descriptions = {
        uiux: 'UI/UXデザイナーの傾向: 画面を描画する「手作業」や「ツール操作」の重要度が劇的に下がる一方、AIを組み合わせて一貫した体験を作る「システム・情報設計」、抽象的な要件を言語化する力、そして人間への深い「共感」が評価のコアとなります。',
        graphic: 'グラフィックデザイナーの傾向: 「ゼロから絵を描く」「複数案を出す」部分はAIに代替されます。代わりに、ビジュアルに意味を持たせる「コンセプト力」、無数の生成物からブランドに合うものを選ぶ「統制力（審美眼）」、そしてAIの出力をプロ品質に引き上げる「微調整」が高く評価されます。'
      };

      const scrollToSection = (id) => {
        const element = document.getElementById(id);
        if (element) {
          element.scrollIntoView({ behavior: 'smooth' });
          setMobileMenuOpen(false);
        }
      };

      return (
        <div className="min-h-screen bg-[#faf9f6] text-[#2d3748]">
          {/* Navigation */}
          <nav className={`fixed w-full z-50 transition-all duration-300 ${
            scrolled ? 'bg-white/95 backdrop-blur-lg shadow-md' : 'bg-white/95 backdrop-blur-lg'
          } border-b border-gray-100`}>
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-16 items-center">
                <div className="flex-shrink-0 font-bold text-[#2b6cb0] text-xl tracking-tighter">
                  ◣ Design<span className="text-[#2d3748]">Shift</span>
                </div>
                <div className="hidden md:flex space-x-8">
                  <button onClick={() => scrollToSection('context')} className="text-sm font-medium text-[#718096] hover:text-[#2b6cb0] transition-colors">背景</button>
                  <button onClick={() => scrollToSection('skill-shift')} className="text-sm font-medium text-[#718096] hover:text-[#2b6cb0] transition-colors">スキルシフト</button>
                  <button onClick={() => scrollToSection('evaluation-uiux')} className="text-sm font-medium text-[#718096] hover:text-[#2b6cb0] transition-colors">UI/UX評価軸</button>
                  <button onClick={() => scrollToSection('evaluation-graphic')} className="text-sm font-medium text-[#718096] hover:text-[#2b6cb0] transition-colors">グラフィック評価軸</button>
                  <button onClick={() => scrollToSection('training')} className="text-sm font-medium text-[#718096] hover:text-[#2b6cb0] transition-colors">育成方針</button>
                </div>
                <div className="md:hidden">
                  <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="text-[#718096] hover:text-[#2b6cb0]">
                    {mobileMenuOpen ? <XIcon /> : <MenuIcon />}
                  </button>
                </div>
              </div>
            </div>
            {mobileMenuOpen && (
              <div className="md:hidden bg-white border-t border-gray-100">
                <div className="px-2 pt-2 pb-3 space-y-1">
                  <button onClick={() => scrollToSection('context')} className="block w-full text-left px-3 py-2 text-base font-medium text-[#718096] hover:text-[#2b6cb0] hover:bg-gray-50">背景</button>
                  <button onClick={() => scrollToSection('skill-shift')} className="block w-full text-left px-3 py-2 text-base font-medium text-[#718096] hover:text-[#2b6cb0] hover:bg-gray-50">スキルシフト</button>
                  <button onClick={() => scrollToSection('evaluation-uiux')} className="block w-full text-left px-3 py-2 text-base font-medium text-[#718096] hover:text-[#2b6cb0] hover:bg-gray-50">UI/UX評価軸</button>
                  <button onClick={() => scrollToSection('evaluation-graphic')} className="block w-full text-left px-3 py-2 text-base font-medium text-[#718096] hover:text-[#2b6cb0] hover:bg-gray-50">グラフィック評価軸</button>
                  <button onClick={() => scrollToSection('training')} className="block w-full text-left px-3 py-2 text-base font-medium text-[#718096] hover:text-[#2b6cb0] hover:bg-gray-50">育成方針</button>
                </div>
              </div>
            )}
          </nav>

          {/* Hero Section */}
          <header className="pt-32 pb-20 px-4 sm:px-6 lg:px-8 max-w-6xl mx-auto text-center">
            <h1 className="text-4xl sm:text-5xl md:text-6xl font-extrabold text-[#2d3748] mb-6 leading-tight">
              AI時代における<br />
              <span className="text-transparent bg-clip-text bg-gradient-to-r from-[#2b6cb0] to-[#c05621]">デザイナーの新しい評価軸</span>
            </h1>
            <p className="mt-4 max-w-2xl text-lg sm:text-xl text-[#718096] mx-auto">
              生成AIの台頭により、デザインの「制作（How）」のコストは劇的に下がりました。これからの時代、デザイナーの価値はどこに見出され、どのように評価・育成すべきかを定義します。
            </p>
          </header>

          {/* Context Section */}
          <section id="context" className="py-16 bg-white">
            <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="mb-10 text-center">
                <span className="text-[#c05621] font-bold tracking-wider text-sm uppercase">✨ Context</span>
                <h2 className="text-3xl font-bold mt-2 mb-4">パラダイムシフト：<br />「作る」から「導く」へ</h2>
                <p className="text-[#718096] text-left">
                  生成AIは強力な「アシスタント」であり、高度なビジュアル生成やレイアウトの叩き台作成を一瞬で行います。この環境下において、評価の比重は「ツールを操作する手作業の速度・精度」から、「AIに何をさせるべきか（What/Why）」を定義し、出力結果を「ビジネス・ユーザーの文脈に合わせて統合・品質管理する能力」へと大きくシフトしています。
                </p>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mt-12">
                <div className="p-6 bg-gray-50 rounded-2xl border border-gray-100 relative overflow-hidden">
                  <div className="absolute -right-4 -top-4 text-8xl text-gray-200 opacity-50 font-serif">"</div>
                  <h3 className="text-lg font-bold text-gray-500 mb-3 flex items-center">
                    <span className="mr-2 text-xl">▽</span> 減少する価値 (コモディティ化)
                  </h3>
                  <ul className="space-y-3 text-[#2d3748]">
                    <li className="flex items-start"><span className="text-gray-400 mr-2">▪</span> ゼロからのレイアウト組みやバリエーション出し</li>
                    <li className="flex items-start"><span className="text-gray-400 mr-2">▪</span> 一般的なアイコンや素材の作成</li>
                    <li className="flex items-start"><span className="text-gray-400 mr-2">▪</span> 定型的なUIコンポーネントの作成</li>
                    <li className="flex items-start"><span className="text-gray-400 mr-2">▪</span> ツール操作自体のスピード</li>
                  </ul>
                </div>
                <div className="p-6 bg-[#ebf8ff] rounded-2xl border border-blue-100 relative overflow-hidden">
                  <div className="absolute -right-4 -top-4 text-8xl text-blue-200 opacity-50 font-serif">!</div>
                  <h3 className="text-lg font-bold text-[#2b6cb0] mb-3 flex items-center">
                    <span className="mr-2 text-xl">△</span> 高まる価値 (コアバリュー)
                  </h3>
                  <ul className="space-y-3 text-[#2d3748]">
                    <li className="flex items-start"><span className="text-[#2b6cb0] mr-2">▪</span> 課題の定義と「なぜ作るのか」の言語化</li>
                    <li className="flex items-start"><span className="text-[#2b6cb0] mr-2">▪</span> ユーザーの感情・コンテキストへの深い共感</li>
                    <li className="flex items-start"><span className="text-[#2b6cb0] mr-2">▪</span> AIの出力をブランドや要件に合わせるディレクション力</li>
                    <li className="flex items-start"><span className="text-[#2b6cb0] mr-2">▪</span> 複雑なシステム全体を俯瞰する情報設計</li>
                  </ul>
                </div>
              </div>
            </div>
          </section>

          {/* Skill Shift Visualization */}
          <section id="skill-shift" className="py-20 bg-[#faf9f6]">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="text-center mb-12">
                <span className="text-[#c05621] font-bold tracking-wider text-sm uppercase">📊 Visualization</span>
                <h2 className="text-3xl font-bold mt-2 mb-4">スキルセットの重心変化</h2>
                <p className="text-[#718096] max-w-2xl mx-auto">
                  以下のレーダーチャートは、従来求められていたスキルセットと、AI時代に求められるスキルセットのバランスの変化を示しています。タブを切り替えて職種ごとの変化を確認してください。
                </p>
              </div>

              <div className="bg-white p-6 sm:p-10 rounded-3xl shadow-sm border border-gray-100">
                <div className="flex justify-center mb-8 space-x-2 sm:space-x-4">
                  <button
                    onClick={() => setActiveRole('uiux')}
                    className={`px-6 py-2 rounded-full font-medium transition-all duration-200 ${
                      activeRole === 'uiux'
                        ? 'bg-[#2b6cb0] text-white shadow-md'
                        : 'bg-gray-100 text-[#718096] hover:bg-gray-200'
                    }`}
                  >
                    UI/UX デザイナー
                  </button>
                  <button
                    onClick={() => setActiveRole('graphic')}
                    className={`px-6 py-2 rounded-full font-medium transition-all duration-200 ${
                      activeRole === 'graphic'
                        ? 'bg-[#c05621] text-white shadow-md'
                        : 'bg-gray-100 text-[#718096] hover:bg-gray-200'
                    }`}
                  >
                    グラフィックデザイナー
                  </button>
                </div>

                <div className="w-full" style={{height: '450px'}}>
                  <ResponsiveContainer width="100%" height="100%">
                    <RadarChart data={chartData}>
                      <PolarGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                      <PolarAngleAxis
                        dataKey="skill"
                        tick={{ fill: '#4a5568', fontSize: 12 }}
                        stroke="#cbd5e0"
                      />
                      <Radar
                        name="従来型 (Traditional)"
                        dataKey="traditional"
                        stroke="#718096"
                        fill="#718096"
                        fillOpacity={0.2}
                        strokeWidth={2}
                        strokeDasharray="5 5"
                      />
                      <Radar
                        name="AI時代 (AI-Era)"
                        dataKey="aiEra"
                        stroke={activeRole === 'uiux' ? '#2b6cb0' : '#c05621'}
                        fill={activeRole === 'uiux' ? '#2b6cb0' : '#c05621'}
                        fillOpacity={0.4}
                        strokeWidth={2}
                      />
                      <Legend
                        wrapperStyle={{ paddingTop: '20px' }}
                        iconType="circle"
                      />
                    </RadarChart>
                  </ResponsiveContainer>
                </div>

                <div className="mt-8 text-center text-sm text-[#718096]">
                  <p><strong>{activeRole === 'uiux' ? 'UI/UXデザイナーの傾向:' : 'グラフィックデザイナーの傾向:'}</strong> {descriptions[activeRole]}</p>
                </div>
              </div>
            </div>
          </section>

          {/* Evaluation Metrics: UI/UX Designer */}
          <section id="evaluation-uiux" className="py-20 bg-white">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="mb-12">
                <div className="flex items-center mb-4">
                  <div className="w-12 h-12 rounded-lg bg-[#ebf8ff] text-[#2b6cb0] flex items-center justify-center text-2xl mr-4">
                    ◦
                  </div>
                  <h2 className="text-3xl font-bold">UI/UXデザイナーの評価軸</h2>
                </div>
                <p className="text-[#718096]">画面の見た目を作るだけでなく、AIを活用してユーザー体験全体の構造を設計・最適化する能力が問われます。</p>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div className="bg-white/95 backdrop-blur-lg border border-gray-100 rounded-2xl p-6 shadow-sm hover:-translate-y-1 transition-transform duration-300">
                  <div className="text-2xl mb-4 text-[#2b6cb0]">⚙</div>
                  <h3 className="text-xl font-bold mb-3">システム思考と全体最適</h3>
                  <div className="h-1 w-12 bg-[#2b6cb0] mb-4"></div>
                  <p className="text-sm text-[#2d3748] mb-4">
                    単一の画面（UI）ではなく、体験全体（UX）を俯瞰する能力。AIが生成した複数のコンポーネントが、一貫したシステムとして機能するかを設計・判断する力。
                  </p>
                  <div className="bg-gray-50 p-3 rounded-lg text-xs">
                    <strong className="text-[#718096] block mb-1">評価ポイント例:</strong>
                    ユーザーのフロー全体での認知負荷の低減、エッジケースの考慮、コンポーネントの再利用性に基づくアーキテクチャ設計。
                  </div>
                </div>

                <div className="bg-white/95 backdrop-blur-lg border border-gray-100 rounded-2xl p-6 shadow-sm hover:-translate-y-1 transition-transform duration-300">
                  <div className="text-2xl mb-4 text-[#c05621]">✎</div>
                  <h3 className="text-xl font-bold mb-3">要件の言語化・プロンプト設計</h3>
                  <div className="h-1 w-12 bg-[#c05621] mb-4"></div>
                  <p className="text-sm text-[#2d3748] mb-4">
                    抽象的なビジネス課題やユーザーニーズを、AIが理解可能な具体的要件（プロンプトや制約条件）に翻訳する能力。
                  </p>
                  <div className="bg-gray-50 p-3 rounded-lg text-xs">
                    <strong className="text-[#718096] block mb-1">評価ポイント例:</strong>
                    AIツール(Figma AI, v0, etc)に対し、適切な文脈、ターゲット、制約を与えて、期待する精度のUI原案を素早く引き出すスキル。
                  </div>
                </div>

                <div className="bg-white/95 backdrop-blur-lg border border-gray-100 rounded-2xl p-6 shadow-sm hover:-translate-y-1 transition-transform duration-300">
                  <div className="text-2xl mb-4 text-green-600">☺</div>
                  <h3 className="text-xl font-bold mb-3">人間への深い共感と倫理観</h3>
                  <div className="h-1 w-12 bg-green-600 mb-4"></div>
                  <p className="text-sm text-[#2d3748] mb-4">
                    AIには理解できない「人間の非合理的な感情」や「コンテキスト」を読み解く力。また、AIの出力に含まれるバイアスを検知し排除する倫理観。
                  </p>
                  <div className="bg-gray-50 p-3 rounded-lg text-xs">
                    <strong className="text-[#718096] block mb-1">評価ポイント例:</strong>
                    定性リサーチの質の高さ、AIが提案したUIが本当にターゲットユーザーの感情に寄り添っているかの批判的検証。
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* Evaluation Metrics: Graphic Designer */}
          <section id="evaluation-graphic" className="py-20 bg-[#faf9f6]">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="mb-12">
                <div className="flex items-center mb-4">
                  <div className="w-12 h-12 rounded-lg bg-[#feebc8] text-[#c05621] flex items-center justify-center text-2xl mr-4">
                    ✿
                  </div>
                  <h2 className="text-3xl font-bold">グラフィックデザイナーの評価軸</h2>
                </div>
                <p className="text-[#718096]">AIが瞬時に高品質なビジュアルを生成する中、「ブランドの核」を守り、AIをディレクションして唯一無二の表現へと昇華させる力が問われます。</p>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div className="bg-white rounded-2xl p-8 border border-gray-100 shadow-sm flex flex-col md:flex-row gap-6">
                  <div className="flex-shrink-0 text-4xl text-[#2b6cb0]">☉</div>
                  <div>
                    <h3 className="text-xl font-bold mb-2">ブランド・アイデンティティの統制（キュレーション）</h3>
                    <p className="text-sm text-[#2d3748] mb-4">
                      無数に生成されるAIの出力結果から、自社やクライアントの「ブランドトーン＆マナー」に完全に合致するものを選び取り、必要に応じて微調整する能力。ゼロから描く力以上に、審美眼と選球眼が評価されます。
                    </p>
                    <div className="inline-flex items-center px-3 py-1 rounded-full bg-gray-100 text-xs font-medium text-gray-800">
                      キーワード: 審美眼, トンマナ管理, キュレーター
                    </div>
                  </div>
                </div>

                <div className="bg-white rounded-2xl p-8 border border-gray-100 shadow-sm flex flex-col md:flex-row gap-6">
                  <div className="flex-shrink-0 text-4xl text-[#c05621]">✐</div>
                  <div>
                    <h3 className="text-xl font-bold mb-2">コンセプチュアル思考とストーリーテリング</h3>
                    <p className="text-sm text-[#2d3748] mb-4">
                      「綺麗な絵」はAIが作れるため、そのビジュアルの背後にある「コンセプト」や「文脈（ストーリー）」を構築する力が重要視されます。なぜその表現であるべきか、論理的かつ感情に訴えかける説明能力が評価軸となります。
                    </p>
                    <div className="inline-flex items-center px-3 py-1 rounded-full bg-gray-100 text-xs font-medium text-gray-800">
                      キーワード: 文脈構築, 意味づけ, コンセプトメイク
                    </div>
                  </div>
                </div>

                <div className="bg-white rounded-2xl p-8 border border-gray-100 shadow-sm flex flex-col md:flex-row gap-6">
                  <div className="flex-shrink-0 text-4xl text-green-600">✋</div>
                  <div>
                    <h3 className="text-xl font-bold mb-2">ラストワンマイルのクラフトマンシップ</h3>
                    <p className="text-sm text-[#2d3748] mb-4">
                      AIの出力は「80点〜90点」のものが多いです。そこから、ピクセル単位でのレイアウト調整、タイポグラフィのカーニング、色彩の微小な補正など、人間ならではの「最後の10点」を詰め切る手作業の精度が、プロと素人を分ける境界線として再評価されます。
                    </p>
                    <div className="inline-flex items-center px-3 py-1 rounded-full bg-gray-100 text-xs font-medium text-gray-800">
                      キーワード: タイポグラフィ, 微調整, 職人技
                    </div>
                  </div>
                </div>

                <div className="bg-white rounded-2xl p-8 border border-gray-100 shadow-sm flex flex-col md:flex-row gap-6">
                  <div className="flex-shrink-0 text-4xl text-purple-600">⚡</div>
                  <div>
                    <h3 className="text-xl font-bold mb-2">AIとの共創ワークフローの構築</h3>
                    <p className="text-sm text-[#2d3748] mb-4">
                      Midjourney等の画像生成AI、Photoshopの生成塗りつぶし等をワークフローに組み込み、従来の数倍のスピードで複数案を提示・検証できるプロセス構築力。ツールの進化をキャッチアップし適応する力が評価されます。
                    </p>
                    <div className="inline-flex items-center px-3 py-1 rounded-full bg-gray-100 text-xs font-medium text-gray-800">
                      キーワード: ツール適応力, 生産性向上, アジリティ
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* Training Timeline */}
          <section id="training" className="py-20 bg-white">
            <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="mb-16 text-center">
                <span className="text-[#2b6cb0] font-bold tracking-wider text-sm uppercase">♟ Strategy</span>
                <h2 className="text-3xl font-bold mt-2 mb-4">新卒デザイナーの育成方針</h2>
                <p className="text-[#718096] text-left md:text-center">
                  最初から「AIを使える」世代である彼ら・彼女らに対し、ショートカットによる基礎スキルの欠落を防ぎつつ、AIを前提とした高度なディレクション能力をいかに育てるかが鍵となります。
                </p>
              </div>

              <div className="relative pl-6 sm:pl-10 pb-10">
                {/* Phase 1 */}
                <div className="relative pb-12 border-l-2 border-gray-200">
                  <div className="absolute w-2.5 h-2.5 rounded-full bg-[#2b6cb0]" style={{left: '-5px', top: '24px'}}></div>
                  <div className="pl-8">
                    <div className="inline-block px-3 py-1 bg-blue-50 text-[#2b6cb0] font-bold text-sm rounded mb-2">Phase 1 : 入社〜半年</div>
                    <h3 className="text-xl font-bold mb-2">「アナログな基礎」と「観察眼」の徹底</h3>
                    <p className="text-[#2d3748] mb-4">
                      AIを使えば「それっぽい」ものはすぐ作れますが、それが「良い」か「悪い」か判断する基準（審美眼）がなければディレクションはできません。あえてAIを制限し、タイポグラフィ、色彩、レイアウトの基礎を理論と手作業で徹底的に学ばせます。
                    </p>
                    <div className="bg-gray-50 p-4 rounded-lg">
                      <h4 className="font-bold text-sm mb-2 text-gray-700">▶ 具体的なアクション</h4>
                      <ul className="list-disc list-inside text-sm text-[#718096] space-y-1">
                        <li>優れたデザインのトレースと、その意図（なぜこの余白か、なぜこの書体か）の言語化。</li>
                        <li>ユーザー観察やインタビューへの同席による、「生の声」や「非言語情報」を拾う訓練。</li>
                      </ul>
                    </div>
                  </div>
                </div>

                {/* Phase 2 */}
                <div className="relative pb-12 border-l-2 border-gray-200">
                  <div className="absolute w-2.5 h-2.5 rounded-full bg-[#2b6cb0]" style={{left: '-5px', top: '24px'}}></div>
                  <div className="pl-8">
                    <div className="inline-block px-3 py-1 bg-[#feebc8] text-[#c05621] font-bold text-sm rounded mb-2">Phase 2 : 半年〜1年</div>
                    <h3 className="text-xl font-bold mb-2">「How」のAI活用と「Why」の壁打ち</h3>
                    <p className="text-[#2d3748] mb-4">
                      基礎ができた段階で、AIツールを本格的に解禁します。「どう作るか（How）」はAIに任せ、自分は「なぜこれを作るのか（Why）」の深掘りに時間を割く働き方にシフトさせます。
                    </p>
                    <div className="bg-gray-50 p-4 rounded-lg">
                      <h4 className="font-bold text-sm mb-2 text-gray-700">▶ 具体的なアクション</h4>
                      <ul className="list-disc list-inside text-sm text-[#718096] space-y-1">
                        <li>AIを用いた大量のアイデア出し（発散）プロセスへの組み込み。</li>
                        <li>メンターとの「なぜこのAI案を選んだのか？」という徹底的な壁打ち（言語化能力の育成）。</li>
                      </ul>
                    </div>
                  </div>
                </div>

                {/* Phase 3 */}
                <div className="relative border-l-2 border-gray-200">
                  <div className="absolute w-2.5 h-2.5 rounded-full bg-green-600" style={{left: '-5px', top: '24px'}}></div>
                  <div className="pl-8 pb-8">
                    <div className="inline-block px-3 py-1 bg-green-50 text-green-700 font-bold text-sm rounded mb-2">Phase 3 : 2年目〜</div>
                    <h3 className="text-xl font-bold mb-2">「プロジェクトのディレクター」への昇華</h3>
                    <p className="text-[#2d3748] mb-4">
                      自らが手を動かすだけでなく、AIという「部下」を使いこなしながら、ビジネス要件や開発要件とデザインをブリッジする役割を持たせます。
                    </p>
                    <div className="bg-gray-50 p-4 rounded-lg">
                      <h4 className="font-bold text-sm mb-2 text-gray-700">▶ 具体的なアクション</h4>
                      <ul className="list-disc list-inside text-sm text-[#718096] space-y-1">
                        <li>小規模プロジェクトにおける、要件定義からAIを用いたプロトタイピング、エンジニアへの引き継ぎまでの一貫したリード。</li>
                        <li>AIの出力に対するバイアスチェックやアクセシビリティの検証責任の付与。</li>
                      </ul>
                    </div>
                  </div>
                </div>
              </div>

              {/* Key Mindset */}
              <div className="mt-8 p-6 bg-gradient-to-br from-gray-800 to-gray-900 text-white rounded-2xl shadow-lg">
                <h3 className="text-xl font-bold mb-3 flex items-center">
                  <span className="text-[#c05621] text-2xl mr-2">★</span> 育成における最重要マインドセット
                </h3>
                <p className="text-gray-300">
                  「AIは答えをくれるものではなく、思考を拡張する壁打ち相手である」という認識を植え付けること。最も危険なのは、AIが出した最初のもっともらしい答えで思考停止してしまうことです。<strong className="text-white">「批判的思考（クリティカルシンキング）」</strong>こそが、AI時代に人間が担うべき最大の責務であることを教え込みます。
                </p>
              </div>
            </div>
          </section>

          {/* Footer */}
          <footer className="bg-white py-12 border-t border-gray-100 text-center">
            <div className="max-w-6xl mx-auto px-4">
              <h2 className="text-2xl font-bold text-[#2b6cb0] mb-4">◣ Design<span className="text-[#2d3748]">Shift</span></h2>
              <p className="text-[#718096] text-sm mb-8">AI時代のデザイナー評価・育成方針まとめレポート</p>
              <div className="text-xs text-gray-400">
                Created as an interactive SPA based on the provided topic.
              </div>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
